name: Crisis Wire Bot

on:
  schedule:
    # GitHub Actions cron is best-effort; */5 gets skipped during peak load.
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [run-bot, approvals-only, webhook-approve, trusted-only]

permissions:
  contents: write

concurrency:
  group: crisiswire-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: ${{ github.event.action }}
        run: python -m src.main

      - name: Commit state
        run: |
          git config user.name "crisiswire-bot"
          git config user.email "bot@crisiswire.local"
          git add state/
          if ! git diff --staged --quiet; then
            git commit -m "state: update [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          else
            echo "no state changes"
          fi
