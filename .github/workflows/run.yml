name: Crisis Wire Bot

on:
  schedule:
    # GitHub Actions cron is best-effort; */5 gets skipped during peak load.
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [run-bot, approvals-only, webhook-approve, trusted-only, force-trusted]

permissions:
  contents: write

concurrency:
  # Per-event-type concurrency groups so the 1-min trusted-only loop doesn't
  # cancel the 10-min full poll (and vice versa). Within each group, the latest
  # queued run still wins — which is fine, all runs in a group are equivalent.
  group: >-
    ${{
      github.event.action == 'trusted-only' && 'trusted'
      || github.event.action == 'webhook-approve' && 'webhook'
      || github.event.action == 'force-trusted' && 'force-trusted'
      || github.event.action == 'approvals-only' && 'approvals'
      || 'full-poll'
    }}
  # Only trusted-only auto-supersedes: it fires ~every minute, so a backlog
  # builds whenever GitHub is slow to allocate runners. Cancelling the older
  # in-progress trusted run is safe — every trusted poll is equivalent (re-reads
  # the same firehose) and the next run re-picks anything unsent. webhook-approve
  # must NEVER be cancelled (it posts to X mid-run); full-poll/approvals stay
  # uncancelled too so a long classify pass isn't dropped.
  cancel-in-progress: ${{ github.event.action == 'trusted-only' }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          MODE: ${{ github.event.action }}
        run: python -m src.main

      - name: Commit state
        run: |
          set -e
          git config user.name "crisiswire-bot"
          git config user.email "bot@crisiswire.local"

          # If nothing changed, bail
          git add state/
          if git diff --staged --quiet; then
            echo "no state changes"
            exit 0
          fi

          git commit -m "state: update [skip ci]"

          # Retry push with smart-merge on conflict (concurrent runs write state)
          for attempt in 1 2 3 4 5; do
            if git push 2>/dev/null; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected (attempt $attempt); smart-merging with remote..."

            # Stash our state files, reset to remote, restore, then merge
            mkdir -p /tmp/local_state
            cp state/*.json /tmp/local_state/ 2>/dev/null || true
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            cp /tmp/local_state/*.json state/ 2>/dev/null || true
            python tools/merge_state.py

            git add state/
            if git diff --staged --quiet; then
              echo "nothing new after merge; done"
              exit 0
            fi
            git commit -m "state: update [skip ci]"
          done

          echo "push failed after 5 attempts; abandoning state changes (next run will resync)"
          exit 0
